<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- Basic Meta -->
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />

    <!-- Viewport -->
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- App Identity -->
    <title>Shorts Downloader – Privacy Policy</title>
    <meta name="application-name" content="Shorts Downloader" />
    <meta name="theme-color" content="#2575FC" />

    <!-- SEO Meta -->
    <meta
      name="description"
      content="Privacy Policy for Shorts Downloader app. Learn how we handle user data, third-party services, and security."
    />
    <meta
      name="keywords"
      content="Shorts Downloader, Privacy Policy, Video Downloader, Instagram Downloader, TikTok Downloader"
    />
    <meta name="author" content="Shorts Downloader Team" />

    <!-- Favicon & Icons -->
<link rel="icon" type="image/svg+xml" href="%PUBLIC_URL%/favicon.svg" />
    <link
      rel="apple-touch-icon"
      sizes="192x192"
      href="%PUBLIC_URL%/logo192.png"
    />

    <!-- PWA Manifest -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <!-- Open Graph (Social Sharing) -->
    <meta property="og:title" content="Shorts Downloader – Privacy Policy" />
    <meta
      property="og:description"
      content="Read the official privacy policy of the Shorts Downloader application."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://shorts-downloader.vercel.app/privacy-policy" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary" />
    <meta
      name="twitter:title"
      content="Shorts Downloader – Privacy Policy"
    />
    <meta
      name="twitter:description"
      content="Privacy Policy for the Shorts Downloader app."
    />

  </head>

  <body>
    <noscript>
      This application requires JavaScript to function properly.
      Please enable JavaScript in your browser.
    </noscript>

    <!-- React Root -->
    <div id="root"></div>
  </body>
</html>
